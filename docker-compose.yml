services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: development          # show errors on screen locally
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: if0_41659126_db_business
      ADMIN_DEFAULT_EMAIL: admin@example.com
      ADMIN_DEFAULT_PASSWORD: changeme123   # local-only default; not used in production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"   # exposed on host 3307 so you can inspect with a DB client if you want
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  dbdata:
