name: Deploy to Contabo

# Runs ONLY when you trigger it by hand from the GitHub "Actions" tab
# (Deploy to Contabo -> Run workflow). This avoids failed runs before the
# server and secrets are ready.
#
# To enable fully automatic deploys later (push to main -> deploy), set the
# repository secrets (see DEPLOY.md), then uncomment the "push:" block below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "Pulling latest code..."
            git fetch --all
            git reset --hard origin/main
            echo "Rebuilding containers..."
            docker compose -f docker-compose.prod.yml up -d --build
            echo "Cleaning up old images..."
            docker image prune -f
            echo "Deploy complete."
