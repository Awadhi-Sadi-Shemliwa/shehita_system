# Nginx reverse-proxy vhost for the SHEHITA system.
#
# Install on the VPS:
#   sudo cp deploy/nginx/system.shehita.co.tz.conf /etc/nginx/sites-available/system.shehita.co.tz
#   sudo ln -s /etc/nginx/sites-available/system.shehita.co.tz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue HTTPS (Certbot will automatically add the 443 server block and
# an HTTP->HTTPS redirect to this file):
#   sudo certbot --nginx -d system.shehita.co.tz
#
# This config does NOT touch your existing FastAPI vhost — Nginx routes by the
# server_name (hostname), so the two apps stay completely independent.

server {
    listen 80;
    listen [::]:80;
    server_name system.shehita.co.tz;

    # Match the PHP upload limits (config: post_max_size = 25M).
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8080;   # must match the host port in docker-compose.prod.yml
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 60s;
    }
}
